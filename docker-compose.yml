version: '3.8'

services:
  # SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - backend
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # RoomBuildingService
  room-building-service:
    build:
      context: ./backend/services/RoomBuildingService
      dockerfile: Dockerfile
    container_name: room-building-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=RoomBuildingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - backend

  # ContractStudentService
  contract-student-service:
    build:
      context: ./backend/services/ContractStudentService
      dockerfile: Dockerfile
    container_name: contract-student-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ContractStudentDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5003:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - student_uploads:/app/wwwroot/uploads

  # BillingMaintenanceService
  billing-maintenance-service:
    build:
      context: ./backend/services/BillingMaintenanceService
      dockerfile: Dockerfile
    container_name: billing-maintenance-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BillingMaintenanceDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5002:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - backend

  # API Gateway
  api-gateway:
    build:
      context: ./backend/APIGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      - room-building-service
      - contract-student-service
      - billing-maintenance-service
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  sqlserver_data:
  student_uploads:
