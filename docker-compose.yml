version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ktx-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Hongtran021005@
      - MSSQL_PID=Express
      - MSSQL_MEMORY_LIMIT_MB=512
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - ktx-network
    restart: unless-stopped
    mem_limit: 600m
    mem_reservation: 450m
    memswap_limit: 1000m

  # Backend Services
  billing-maintenance-service:
    build:
      context: ./backend/services/BillingMaintenanceService
      dockerfile: Dockerfile
    container_name: ktx-billing-service
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BillingMaintenanceDb;User Id=sa;Password=Hongtran021005@;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Services__RoomBuildingService=http://room-building-service:8080
    depends_on:
      - sqlserver
    networks:
      - ktx-network
    restart: unless-stopped
    mem_limit: 200m
    mem_reservation: 150m

  contract-student-service:
    build:
      context: ./backend/services/ContractStudentService
      dockerfile: Dockerfile
    container_name: ktx-contract-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ContractStudentDb;User Id=sa;Password=Hongtran021005@;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Services__BillingService=http://billing-maintenance-service:8080
      - Services__RoomBuildingService=http://room-building-service:8080
    depends_on:
      - sqlserver
    volumes:
      - contract-uploads:/app/wwwroot/uploads
    networks:
      - ktx-network
    restart: unless-stopped
    mem_limit: 200m
    mem_reservation: 150m

  room-building-service:
    build:
      context: ./backend/services/RoomBuildingService
      dockerfile: Dockerfile
    container_name: ktx-room-service
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=RoomBuildingDb;User Id=sa;Password=Hongtran021005@;TrustServerCertificate=True;MultipleActiveResultSets=true
    depends_on:
      - sqlserver
    volumes:
      - room-uploads:/app/wwwroot/uploads
    networks:
      - ktx-network
    restart: unless-stopped
    mem_limit: 200m
    mem_reservation: 150m

  api-gateway:
    build:
      context: ./backend/APIGateway
      dockerfile: Dockerfile
    container_name: ktx-gateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - billing-maintenance-service
      - contract-student-service
      - room-building-service
    networks:
      - ktx-network
    restart: unless-stopped
    mem_limit: 100m
    mem_reservation: 50m

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ktx-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - ktx-network
    restart: unless-stopped
    mem_limit: 50m
    mem_reservation: 30m

networks:
  ktx-network:
    driver: bridge

volumes:
  sqlserver-data:
  contract-uploads:
  room-uploads:
