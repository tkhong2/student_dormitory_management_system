version: '3.8'

services:
  billing-maintenance-service:
    build:
      context: ./services/BillingMaintenanceService
      dockerfile: BillingMaintenanceService.API/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - backend-network

  contract-student-service:
    build:
      context: ./services/ContractStudentService
      dockerfile: ContractStudentService.API/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - backend-network

  room-building-service:
    build:
      context: ./services/RoomBuildingService
      dockerfile: RoomBuildingService.API/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - backend-network

  api-gateway:
    build:
      context: ./APIGateway
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - billing-maintenance-service
      - contract-student-service
      - room-building-service
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
