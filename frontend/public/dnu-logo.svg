<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff8844;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <g transform="translate(100, 100)">
    <!-- Main sun body - large circle -->
    <circle r="50" fill="url(#sunGradient)"/>
    
    <!-- 16 triangular rays -->
    <!-- Top -->
    <polygon points="0,-50 -8,-75 8,-75" fill="url(#sunGradient)"/>
    <!-- Top-right diagonal 1 -->
    <polygon points="25,-43.3 18,-68 32,-63" fill="url(#sunGradient)"/>
    <!-- Right diagonal 1 -->
    <polygon points="43.3,-25 63,-32 68,-18" fill="url(#sunGradient)"/>
    <!-- Right -->
    <polygon points="50,0 75,-8 75,8" fill="url(#sunGradient)"/>
    <!-- Right-bottom diagonal 1 -->
    <polygon points="43.3,25 68,18 63,32" fill="url(#sunGradient)"/>
    <!-- Bottom-right diagonal 1 -->
    <polygon points="25,43.3 32,63 18,68" fill="url(#sunGradient)"/>
    <!-- Bottom -->
    <polygon points="0,50 -8,75 8,75" fill="url(#sunGradient)"/>
    <!-- Bottom-left diagonal 1 -->
    <polygon points="-25,43.3 -18,68 -32,63" fill="url(#sunGradient)"/>
    <!-- Left diagonal 1 -->
    <polygon points="-43.3,25 -63,32 -68,18" fill="url(#sunGradient)"/>
    <!-- Left -->
    <polygon points="-50,0 -75,-8 -75,8" fill="url(#sunGradient)"/>
    <!-- Left-top diagonal 1 -->
    <polygon points="-43.3,-25 -68,-18 -63,-32" fill="url(#sunGradient)"/>
    <!-- Top-left diagonal 1 -->
    <polygon points="-25,-43.3 -32,-63 -18,-68" fill="url(#sunGradient)"/>
    
    <!-- Additional 4 rays between main rays -->
    <!-- Top-right -->
    <polygon points="35.4,-35.4 40,-58 50,-48" fill="url(#sunGradient)"/>
    <!-- Bottom-right -->
    <polygon points="35.4,35.4 50,48 40,58" fill="url(#sunGradient)"/>
    <!-- Bottom-left -->
    <polygon points="-35.4,35.4 -40,58 -50,48" fill="url(#sunGradient)"/>
    <!-- Top-left -->
    <polygon points="-35.4,-35.4 -50,-48 -40,-58" fill="url(#sunGradient)"/>
    
    <!-- 16 dots around the sun -->
    <!-- Cardinal directions -->
    <circle cx="0" cy="-85" r="7" fill="#ff6b00"/>
    <circle cx="85" cy="0" r="7" fill="#ff6b00"/>
    <circle cx="0" cy="85" r="7" fill="#ff6b00"/>
    <circle cx="-85" cy="0" r="7" fill="#ff6b00"/>
    
    <!-- Diagonal directions -->
    <circle cx="60" cy="-60" r="7" fill="#ff6b00"/>
    <circle cx="60" cy="60" r="7" fill="#ff6b00"/>
    <circle cx="-60" cy="60" r="7" fill="#ff6b00"/>
    <circle cx="-60" cy="-60" r="7" fill="#ff6b00"/>
    
    <!-- In-between dots -->
    <circle cx="42" cy="-73" r="7" fill="#ff6b00"/>
    <circle cx="73" cy="-42" r="7" fill="#ff6b00"/>
    <circle cx="73" cy="42" r="7" fill="#ff6b00"/>
    <circle cx="42" cy="73" r="7" fill="#ff6b00"/>
    <circle cx="-42" cy="73" r="7" fill="#ff6b00"/>
    <circle cx="-73" cy="42" r="7" fill="#ff6b00"/>
    <circle cx="-73" cy="-42" r="7" fill="#ff6b00"/>
    <circle cx="-42" cy="-73" r="7" fill="#ff6b00"/>
  </g>
</svg>
