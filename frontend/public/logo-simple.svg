<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Sun/Star shape -->
  <g transform="translate(100, 60)">
    <!-- Main star body -->
    <circle r="35" fill="url(#orangeGradient)"/>
    
    <!-- 16 rays -->
    <g fill="url(#orangeGradient)">
      <!-- Top -->
      <polygon points="0,-35 -4,-50 4,-50"/>
      <!-- Top-right 1 -->
      <polygon points="24.7,-24.7 20,-38 28,-34"/>
      <!-- Right 1 -->
      <polygon points="35,0 50,-4 50,4"/>
      <!-- Bottom-right 1 -->
      <polygon points="24.7,24.7 34,28 38,20"/>
      <!-- Bottom -->
      <polygon points="0,35 -4,50 4,50"/>
      <!-- Bottom-left 1 -->
      <polygon points="-24.7,24.7 -28,34 -34,28"/>
      <!-- Left 1 -->
      <polygon points="-35,0 -50,-4 -50,4"/>
      <!-- Top-left 1 -->
      <polygon points="-24.7,-24.7 -34,-28 -38,-20"/>
      
      <!-- Diagonal rays -->
      <polygon points="17.5,-30.3 14,-42 22,-38"/>
      <polygon points="30.3,-17.5 38,-22 42,-14"/>
      <polygon points="30.3,17.5 42,14 38,22"/>
      <polygon points="17.5,30.3 22,38 14,42"/>
      <polygon points="-17.5,30.3 -14,42 -22,38"/>
      <polygon points="-30.3,17.5 -38,22 -42,14"/>
      <polygon points="-30.3,-17.5 -42,-14 -38,-22"/>
      <polygon points="-17.5,-30.3 -22,-38 -14,-42"/>
    </g>
    
    <!-- Dots around -->
    <g fill="#F57C00">
      <circle cx="0" cy="-55" r="4"/>
      <circle cx="39" cy="-39" r="4"/>
      <circle cx="55" cy="0" r="4"/>
      <circle cx="39" cy="39" r="4"/>
      <circle cx="0" cy="55" r="4"/>
      <circle cx="-39" cy="39" r="4"/>
      <circle cx="-55" cy="0" r="4"/>
      <circle cx="-39" cy="-39" r="4"/>
      
      <circle cx="27.5" cy="-47.6" r="4"/>
      <circle cx="47.6" cy="-27.5" r="4"/>
      <circle cx="47.6" cy="27.5" r="4"/>
      <circle cx="27.5" cy="47.6" r="4"/>
      <circle cx="-27.5" cy="47.6" r="4"/>
      <circle cx="-47.6" cy="27.5" r="4"/>
      <circle cx="-47.6" cy="-27.5" r="4"/>
      <circle cx="-27.5" cy="-47.6" r="4"/>
    </g>
  </g>
  
  <!-- Text ĐẠI NAM -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#FF6B00" text-anchor="middle" letter-spacing="2">ĐẠI NAM</text>
  
  <!-- Text UNIVERSITY -->
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1a3a6b" text-anchor="middle" letter-spacing="4">UNIVERSITY</text>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
