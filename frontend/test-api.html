<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Connection</title>
</head>
<body>
    <h1>Test BillingMaintenanceService API</h1>
    <button onclick="testInvoices()">Test Invoices API</button>
    <button onclick="testPayments()">Test Payments API</button>
    <button onclick="testMaintenance()">Test Maintenance API</button>
    <pre id="result"></pre>

    <script>
        const API_BASE = 'http://localhost:5002/api';

        async function testInvoices() {
            try {
                const response = await fetch(`${API_BASE}/invoices`);
                const data = await response.json();
                document.getElementById('result').textContent = 
                    `SUCCESS!\nStatus: ${response.status}\nData: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('result').textContent = 
                    `ERROR!\n${error.message}`;
            }
        }

        async function testPayments() {
            try {
                const response = await fetch(`${API_BASE}/payments`);
                const data = await response.json();
                document.getElementById('result').textContent = 
                    `SUCCESS!\nStatus: ${response.status}\nData: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('result').textContent = 
                    `ERROR!\n${error.message}`;
            }
        }

        async function testMaintenance() {
            try {
                const response = await fetch(`${API_BASE}/maintenancerequests`);
                const data = await response.json();
                document.getElementById('result').textContent = 
                    `SUCCESS!\nStatus: ${response.status}\nData: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('result').textContent = 
                    `ERROR!\n${error.message}`;
            }
        }
    </script>
</body>
</html>
