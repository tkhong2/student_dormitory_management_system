<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Avatar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        .user-card {
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #eee;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .info {
            flex: 1;
        }
        .label {
            font-weight: bold;
            color: #666;
        }
        button {
            background: #1890ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #40a9ff;
        }
        .error {
            color: #ff4d4f;
            font-weight: bold;
        }
        .success {
            color: #52c41a;
            font-weight: bold;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Debug Avatar - Kiểm tra avatarUrl</h1>

    <div class="section">
        <h2>1. Kiểm tra localStorage</h2>
        <button onclick="checkLocalStorage()">Kiểm tra LocalStorage</button>
        <button onclick="clearLocalStorage()">Clear LocalStorage</button>
        <div id="localStorage-result"></div>
    </div>

    <div class="section">
        <h2>2. Kiểm tra tất cả Users từ API</h2>
        <button onclick="checkAllUsers()">Load All Users</button>
        <div id="users-result"></div>
    </div>

    <div class="section">
        <h2>3. Kiểm tra User hiện tại</h2>
        <button onclick="checkCurrentUser()">Check Current User</button>
        <div id="current-user-result"></div>
    </div>

    <div class="section">
        <h2>4. Test Login với user cụ thể</h2>
        <input type="text" id="username" placeholder="Username" style="padding: 8px; width: 200px;">
        <input type="password" id="password" placeholder="Password" style="padding: 8px; width: 200px;">
        <button onclick="testLogin()">Login và Kiểm tra</button>
        <div id="login-result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5002/api';

        function checkLocalStorage() {
            const result = document.getElementById('localStorage-result');
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            let html = '<h3>LocalStorage Data:</h3>';
            
            if (token) {
                html += `<p><span class="label">Token:</span> ${token.substring(0, 50)}...</p>`;
            } else {
                html += `<p class="error">❌ Không có token</p>`;
            }
            
            if (user) {
                const userData = JSON.parse(user);
                html += `<p><span class="label">User:</span></p>`;
                html += `<pre>${JSON.stringify(userData, null, 2)}</pre>`;
                
                if (userData.avatarUrl) {
                    html += `<p class="success">✅ avatarUrl: ${userData.avatarUrl}</p>`;
                    html += `<img src="${userData.avatarUrl}" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=Error&background=ff4d4f&color=fff'" />`;
                } else {
                    html += `<p class="error">❌ Không có avatarUrl</p>`;
                }
            } else {
                html += `<p class="error">❌ Không có user data</p>`;
            }
            
            result.innerHTML = html;
        }

        function clearLocalStorage() {
            localStorage.clear();
            alert('✅ Đã xóa localStorage');
            checkLocalStorage();
        }

        async function checkAllUsers() {
            const result = document.getElementById('users-result');
            result.innerHTML = '<p>⏳ Đang load...</p>';
            
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    result.innerHTML = '<p class="error">❌ Chưa đăng nhập! Vui lòng login trước.</p>';
                    return;
                }
                
                const response = await fetch(`${API_URL}/users`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const users = await response.json();
                
                let html = `<h3>Tìm thấy ${users.length} users:</h3>`;
                
                users.forEach(user => {
                    const avatarUrl = user.avatarUrl 
                        ? (user.avatarUrl.startsWith('http') 
                            ? user.avatarUrl 
                            : `http://localhost:5003${user.avatarUrl}`)
                        : `https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName || 'U')}&background=1890ff&color=fff`;
                    
                    html += `
                        <div class="user-card">
                            <img src="${avatarUrl}" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=Error&background=ff4d4f&color=fff'" />
                            <div class="info">
                                <div><span class="label">ID:</span> ${user.id}</div>
                                <div><span class="label">Name:</span> ${user.fullName}</div>
                                <div><span class="label">Username:</span> ${user.username}</div>
                                <div><span class="label">Role:</span> ${user.role}</div>
                                <div><span class="label">AvatarUrl:</span> ${user.avatarUrl || '<span class="error">NULL</span>'}</div>
                            </div>
                        </div>
                    `;
                });
                
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = `<p class="error">❌ Lỗi: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }

        function checkCurrentUser() {
            const result = document.getElementById('current-user-result');
            const user = localStorage.getItem('user');
            
            if (!user) {
                result.innerHTML = '<p class="error">❌ Chưa đăng nhập!</p>';
                return;
            }
            
            const userData = JSON.parse(user);
            
            const avatarUrl = userData.avatarUrl 
                ? (userData.avatarUrl.startsWith('http') 
                    ? userData.avatarUrl 
                    : `http://localhost:5003${userData.avatarUrl}`)
                : `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.fullName || 'U')}&background=ff6b00&color=fff`;
            
            let html = `
                <h3>Current User:</h3>
                <div class="user-card">
                    <img src="${avatarUrl}" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=Error&background=ff4d4f&color=fff'" />
                    <div class="info">
                        <div><span class="label">ID:</span> ${userData.id}</div>
                        <div><span class="label">Name:</span> ${userData.fullName}</div>
                        <div><span class="label">Username:</span> ${userData.username}</div>
                        <div><span class="label">Role:</span> ${userData.role}</div>
                        <div><span class="label">AvatarUrl (raw):</span> ${userData.avatarUrl || '<span class="error">NULL</span>'}</div>
                        <div><span class="label">AvatarUrl (processed):</span> ${avatarUrl}</div>
                    </div>
                </div>
                <h4>Full User Object:</h4>
                <pre>${JSON.stringify(userData, null, 2)}</pre>
            `;
            
            result.innerHTML = html;
        }

        async function testLogin() {
            const result = document.getElementById('login-result');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Vui lòng nhập username và password');
                return;
            }
            
            result.innerHTML = '<p>⏳ Đang login...</p>';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Login failed');
                }
                
                const data = await response.json();
                
                // Process avatarUrl
                if (data.user.avatarUrl && !data.user.avatarUrl.startsWith('http')) {
                    data.user.avatarUrl = `http://localhost:5003${data.user.avatarUrl}`;
                }
                
                // Save to localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                const avatarUrl = data.user.avatarUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.user.fullName)}&background=ff6b00&color=fff`;
                
                let html = `
                    <h3 class="success">✅ Login thành công!</h3>
                    <div class="user-card">
                        <img src="${avatarUrl}" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=Error&background=ff4d4f&color=fff'" />
                        <div class="info">
                            <div><span class="label">ID:</span> ${data.user.id}</div>
                            <div><span class="label">Name:</span> ${data.user.fullName}</div>
                            <div><span class="label">Username:</span> ${data.user.username}</div>
                            <div><span class="label">Role:</span> ${data.user.role}</div>
                            <div><span class="label">AvatarUrl (raw from API):</span> ${data.user.avatarUrl || '<span class="error">NULL</span>'}</div>
                            <div><span class="label">AvatarUrl (processed):</span> ${avatarUrl}</div>
                        </div>
                    </div>
                    <h4>Response Data:</h4>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = `<p class="error">❌ Login thất bại: ${error.message}</p>`;
                console.error('Login error:', error);
            }
        }

        // Auto check on load
        window.addEventListener('load', () => {
            checkLocalStorage();
            checkCurrentUser();
        });
    </script>
</body>
</html>
